# docker-compose placeholder

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend

    container_name: finance-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./data:/app/data

    restart: unless-stopped


  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend

    container_name: finance-frontend

    ports:
      - "8501:8501"

    depends_on:
      - backend

    env_file:
      - .env

    restart: unless-stopped